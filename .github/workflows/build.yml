name: Build

on:
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create GitHub Release with artifacts'
        required: false
        type: boolean
        default: true
  push:
    branches: [main]

# Cancel in-progress runs for the same branch
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  RCLONE_VERSION: '1.68.2'

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            rclone_os: linux
            rclone_arch: amd64
            rclone_ext: ''
            sidecar_suffix: '-x86_64-unknown-linux-gnu'
            bundles: 'deb,rpm,appimage'
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            rclone_os: windows
            rclone_arch: amd64
            rclone_ext: '.exe'
            sidecar_suffix: '-x86_64-pc-windows-msvc.exe'
            bundles: 'msi'
          - platform: macos-latest
            target: aarch64-apple-darwin
            rclone_os: osx
            rclone_arch: arm64
            rclone_ext: ''
            sidecar_suffix: '-aarch64-apple-darwin'
            bundles: 'dmg'
          - platform: macos-latest
            target: x86_64-apple-darwin
            rclone_os: osx
            rclone_arch: amd64
            rclone_ext: ''
            sidecar_suffix: '-x86_64-apple-darwin'
            bundles: 'dmg'

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      # --- System dependencies (Linux) ---
      - name: Install system dependencies (Ubuntu)
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf xvfb

      # --- Node.js ---
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # --- Rust ---
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: 'src-tauri -> target'

      # --- rclone sidecar ---
      - name: Download rclone sidecar (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          curl -fsSL "https://downloads.rclone.org/v${{ env.RCLONE_VERSION }}/rclone-v${{ env.RCLONE_VERSION }}-${{ matrix.rclone_os }}-${{ matrix.rclone_arch }}.zip" -o rclone.zip
          unzip -o rclone.zip
          cp "rclone-v${{ env.RCLONE_VERSION }}-${{ matrix.rclone_os }}-${{ matrix.rclone_arch }}/rclone" \
             "src-tauri/rclone${{ matrix.sidecar_suffix }}"
          chmod +x "src-tauri/rclone${{ matrix.sidecar_suffix }}"
          rm -rf rclone.zip rclone-v*

      - name: Download rclone sidecar (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://downloads.rclone.org/v${{ env.RCLONE_VERSION }}/rclone-v${{ env.RCLONE_VERSION }}-windows-amd64.zip" -OutFile rclone.zip
          Expand-Archive -Path rclone.zip -DestinationPath . -Force
          Copy-Item "rclone-v${{ env.RCLONE_VERSION }}-windows-amd64\rclone.exe" "src-tauri\rclone${{ matrix.sidecar_suffix }}"
          Remove-Item rclone.zip, "rclone-v*" -Recurse -Force

      # --- Validate icons exist ---
      - name: Validate required icons exist
        shell: bash
        run: |
          missing=0
          for f in src-tauri/icons/icon.ico src-tauri/icons/icon.icns src-tauri/icons/32x32.png src-tauri/icons/128x128.png src-tauri/icons/256x256.png src-tauri/icons/128x128@2x.png src-tauri/icons/tray-icon.png; do
            if [ ! -f "$f" ]; then
              echo "::error::Missing required icon: $f"
              missing=1
            fi
          done
          if [ "$missing" -eq 1 ]; then exit 1; fi
          echo "All required icons present"

      # --- Install frontend deps ---
      - name: Install frontend dependencies
        run: npm install

      # --- Apple certificate (macOS only) ---
      - name: Import Apple Developer certificate
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          echo -n "$APPLE_CERTIFICATE" | base64 -D > $CERTIFICATE_PATH
          security create-keychain -p "" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "" $KEYCHAIN_PATH
          security import $CERTIFICATE_PATH -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "" $KEYCHAIN_PATH
          security list-keychains -d user -s $KEYCHAIN_PATH login.keychain

      # --- Apple notarization key (macOS only) ---
      - name: Write Apple API key
        if: runner.os == 'macOS'
        env:
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
        run: |
          mkdir -p ~/private_keys
          echo -n "$APPLE_API_KEY_CONTENT" > ~/private_keys/AuthKey_${APPLE_API_KEY}.p8

      # --- Build with Tauri ---
      - name: Build Tauri app
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          NO_STRIP: ${{ startsWith(matrix.platform, 'ubuntu') && '1' || '' }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: ~/private_keys/AuthKey_${{ secrets.APPLE_API_KEY }}.p8
        run: npx tauri build --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}

      # --- Fix AppImage EGL/Wayland compatibility ---
      # The bundled libwayland-client.so conflicts with host Mesa EGL drivers,
      # causing "Could not create default EGL display: EGL_BAD_PARAMETER".
      # Fix: remove bundled wayland/EGL libs so the host's matching set is used.
      - name: Fix AppImage EGL/Wayland compatibility
        if: startsWith(matrix.platform, 'ubuntu')
        shell: bash
        run: |
          set -euo pipefail
          APPIMAGE="$(find src-tauri/target/${{ matrix.target }}/release/bundle/appimage -name '*.AppImage' -print -quit)"
          test -n "$APPIMAGE"
          chmod +x "$APPIMAGE"

          # Extract AppImage
          rm -rf squashfs-root
          "$APPIMAGE" --appimage-extract >/dev/null

          # Remove bundled libraries that MUST come from host system.
          # These conflict with the host GPU/Mesa/Wayland stack.
          cd squashfs-root/usr/lib
          rm -f libwayland-client.so* libwayland-server.so* libwayland-cursor.so* libwayland-egl.so*
          rm -f libEGL.so* libEGL_mesa.so* libGL.so* libGLX.so* libGLdispatch.so* libgbm.so*
          cd ../../..

          # Allow native Wayland instead of forcing X11
          HOOK="squashfs-root/apprun-hooks/linuxdeploy-plugin-gtk.sh"
          if [ -f "$HOOK" ]; then
            sed -i 's/^export GDK_BACKEND=x11/#export GDK_BACKEND=x11/' "$HOOK"
          fi

          # Repack AppImage
          wget -q "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage" -O appimagetool
          chmod +x appimagetool
          ARCH=x86_64 ./appimagetool --appimage-extract-and-run squashfs-root "$APPIMAGE"
          rm -rf squashfs-root appimagetool

      # --- Create GitHub Release ---
      - name: Get app version
        id: version
        shell: bash
        run: |
          VERSION=$(node -e 'console.log(require("./package.json").version)')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Extracted version: $VERSION"

      - name: Create or update release
        if: github.event.inputs.create_release == 'true' || github.event_name == 'push'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          gh release create "$TAG" \
            --title "Veloryn CloudFile $TAG" \
            --notes "## Veloryn CloudFile $TAG

          Klient synchronizacji plików.

          ### Instalacja
          - **Windows**: Pobierz \`.msi\` i uruchom instalator
          - **macOS**: Pobierz \`.dmg\`, otwórz i przeciągnij do Aplikacji
          - **Linux (Debian/Ubuntu)**: Pobierz \`.deb\` i zainstaluj: \`sudo dpkg -i *.deb\`
          - **Linux (uniwersalny)**: Pobierz \`.AppImage\`, nadaj uprawnienia \`chmod +x\` i uruchom" \
            2>/dev/null || true
          # Upload artifacts to release
          find src-tauri/target/${{ matrix.target }}/release/bundle -type f \
            \( -name "*.msi" -o -name "*.dmg" -o -name "*.deb" -o -name "*.AppImage" -o -name "*.rpm" \
               -o -name "*.sig" -o -name "*.json" -o -name "*.tar.gz" -o -name "*.zip" \) \
            -exec gh release upload "$TAG" {} --clobber \;

      # --- Cleanup Apple certificate ---
      - name: Cleanup Apple signing artifacts
        if: runner.os == 'macOS' && always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db 2>/dev/null || true
          rm -f $RUNNER_TEMP/certificate.p12
          rm -rf ~/private_keys

      # --- Upload individual artifacts ---
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: drive-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.deb
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.AppImage
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.rpm
          retention-days: 30
          if-no-files-found: warn

  finalize:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: github.event.inputs.create_release == 'true' || github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Get app version
        id: version
        shell: bash
        run: |
          VERSION=$(node -e 'console.log(require("./package.json").version)')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Extracted version: $VERSION"

      - name: Build and upload latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          TAG="v$VERSION"
          REPO="ReadyNextOs/ReadyNextOsDrive"
          BASE_URL="https://github.com/$REPO/releases/download/$TAG"

          # Download .sig files from release to read signatures
          mkdir -p /tmp/sigs
          gh release download "$TAG" --repo "$REPO" --pattern "*.sig" --dir /tmp/sigs --clobber

          # Build platforms object from actual assets
          PLATFORMS="{}"

          # Linux x86_64 — AppImage
          APPIMAGE_SIG="/tmp/sigs/Veloryn.CloudFile_${VERSION}_amd64.AppImage.sig"
          if [ -f "$APPIMAGE_SIG" ]; then
            SIG=$(cat "$APPIMAGE_SIG")
            URL="$BASE_URL/Veloryn.CloudFile_${VERSION}_amd64.AppImage"
            PLATFORMS=$(echo "$PLATFORMS" | jq --arg url "$URL" --arg sig "$SIG" '. + {"linux-x86_64": {"url": $url, "signature": $sig}}')
            echo "Added linux-x86_64"
          fi

          # Windows x86_64 — MSI
          MSI_SIG="/tmp/sigs/Veloryn.CloudFile_${VERSION}_x64_pl-PL.msi.sig"
          if [ -f "$MSI_SIG" ]; then
            SIG=$(cat "$MSI_SIG")
            URL="$BASE_URL/Veloryn.CloudFile_${VERSION}_x64_pl-PL.msi"
            PLATFORMS=$(echo "$PLATFORMS" | jq --arg url "$URL" --arg sig "$SIG" '. + {"windows-x86_64": {"url": $url, "signature": $sig}}')
            echo "Added windows-x86_64"
          fi

          # macOS — requires .app.tar.gz which only exists if built with --bundles app
          # Currently building --bundles dmg only, so macOS updater artifacts are not generated.

          # Assemble the final latest.json
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          jq -n \
            --arg version "$VERSION" \
            --arg notes "Veloryn CloudFile v$VERSION" \
            --arg pub_date "$PUB_DATE" \
            --argjson platforms "$PLATFORMS" \
            '{version: $version, notes: $notes, pub_date: $pub_date, platforms: $platforms}' \
            > /tmp/latest.json

          echo "=== Generated latest.json ==="
          cat /tmp/latest.json

          gh release upload "$TAG" /tmp/latest.json --clobber
